<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Background Drop Shadow -->
  <rect x="25" y="15" width="50" height="75" rx="5" fill="#d81b60" opacity="0.3" transform="translate(3, 3)" />
  
  <!-- Clipboard Body -->
  <rect x="25" y="15" width="50" height="75" rx="5" fill="#fce4ec" stroke="#d81b60" stroke-width="3" />
  
  <!-- Clipboard Clip Top -->
  <rect x="35" y="10" width="30" height="12" rx="3" fill="#ec407a" stroke="#d81b60" stroke-width="2" />
  <circle cx="50" cy="16" r="3" fill="#f8bbd0" />

  <!-- Checklist Items -->
  <line x1="45" y1="35" x2="65" y2="35" stroke="#d81b60" stroke-width="3" stroke-linecap="round" />
  <line x1="45" y1="50" x2="65" y2="50" stroke="#d81b60" stroke-width="3" stroke-linecap="round" />
  <line x1="45" y1="65" x2="65" y2="65" stroke="#f06292" stroke-width="3" stroke-linecap="round" stroke-dasharray="1 4" />
  <line x1="45" y1="80" x2="65" y2="80" stroke="#f06292" stroke-width="3" stroke-linecap="round" stroke-dasharray="1 4" />

  <!-- Checkboxes -->
  <rect x="32" y="31" width="8" height="8" rx="2" fill="#f8bbd0" stroke="#d81b60" stroke-width="2" />
  <path d="M34 35 L36 37 L40 31" fill="none" stroke="#d81b60" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

  <rect x="32" y="46" width="8" height="8" rx="2" fill="#f8bbd0" stroke="#d81b60" stroke-width="2" />
  <path d="M34 50 L36 52 L40 46" fill="none" stroke="#d81b60" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

  <rect x="32" y="61" width="8" height="8" rx="2" fill="#fce4ec" stroke="#f06292" stroke-width="2" />
  <rect x="32" y="76" width="8" height="8" rx="2" fill="#fce4ec" stroke="#f06292" stroke-width="2" />
</svg>
